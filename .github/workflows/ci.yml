name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  isolation:
    name: Multi-tenant isolation suite (Phase 1a)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cibora
          POSTGRES_PASSWORD: cibora
          POSTGRES_DB: cibora_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cibora -d cibora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap ephemeral schema (auth shim + production schema dump)
        env:
          PGPASSWORD: cibora
          DATABASE_URL: postgres://cibora:cibora@localhost:5432/cibora_test
        run: |
          # NEVER point this job at production. The service container above
          # is a throwaway Postgres — same rule applies every future phase.
          #
          # scripts/ci/base-schema.sql is a schema-only pg_dump of the current
          # production public schema (Phase-1a + Phase-1b already merged), so
          # the isolation suite runs against the real schema shape. Re-applying
          # the Phase 1a/1b migration files on top would fail with "already
          # exists" — the dump IS the post-Phase-1a state. When a new phase
          # ships, refresh the dump (pg_dump --schema-only --schema=public
          # --no-owner --no-privileges --no-comments) in the same commit.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci/auth-shim.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/ci/base-schema.sql
      - name: Run isolation suite against ephemeral DB
        env:
          DATABASE_URL: postgres://cibora:cibora@localhost:5432/cibora_test
        run: npm run test:isolation

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
